name: Deploy functions-v4 to Azure

# Deploys the functions-v4/ folder to the oth-pataka-api-v4 Function App.
# Runs only when something under functions-v4/ changes, so ordinary frontend
# commits don't trigger a backend deploy. Can also be run by hand from the
# Actions tab (workflow_dispatch).

on:
  push:
    branches: [main]
    paths:
      - 'functions-v4/**'
      - '.github/workflows/deploy-functions-v4.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: oth-pataka-api-v4
  AZURE_FUNCTIONAPP_PACKAGE_PATH: functions-v4

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: 'flexconsumption'
          remote-build: 'true'
